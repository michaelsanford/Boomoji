<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Generating icons… check your Downloads folder.</p>
<canvas id="c"></canvas>
<script>
function makeIcon(size, name) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#FF6B9D');
  grad.addColorStop(1, '#C77DFF');

  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.font = `${size * 0.56}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎈', size / 2, size * 0.52);

  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

makeIcon(192, 'icon-192.png');
setTimeout(() => makeIcon(512, 'icon-512.png'), 300);
setTimeout(() => makeIcon(180, 'apple-touch-icon.png'), 600);
</script>
</body>
</html>
